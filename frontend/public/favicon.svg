<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="50%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#grad)"/>
  <!-- Log lines (left-aligned, like a log file) -->
  <rect x="7"  y="9"  width="12" height="2.5" rx="1.25" fill="white" opacity="0.95"/>
  <rect x="7"  y="14" width="18" height="2.5" rx="1.25" fill="white" opacity="0.95"/>
  <rect x="7"  y="19" width="10" height="2.5" rx="1.25" fill="white" opacity="0.95"/>
  <!-- Blinking cursor dot -->
  <rect x="19" y="19" width="5"  height="2.5" rx="1.25" fill="white" opacity="0.6"/>
</svg>
